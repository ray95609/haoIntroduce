<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIC LIN | ELITE PERFORMANCE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --primary: #f0ff42;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Space Grotesk', sans-serif;
            --transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            width: 100%;
            height: 600vh; /* Scroll length */
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen (Energy Boot) */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loader-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transform: rotate(-90deg);
            transform-origin: center;
        }

        .loader-percent {
            position: absolute;
            bottom: 35%; /* Fixed position relative to center */
            font-family: var(--font-accent);
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }

        /* Theater Stage */
        .theater-stage {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 5;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Guided Dot (Theatre Version) */
        .guided-dot {
            position: fixed;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 10001;
            pointer-events: none;
            box-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            transform: translate(-50%, -50%);
            opacity: 0; /* Initially hidden to prevent top-left flash */
            will-change: left, top, transform, width, height, border-radius;
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        height 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        border-radius 0.6s ease,
                        opacity 0.4s ease;
        }

        .dot-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(8px);
            z-index: -1;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center;
            opacity: 0;
        }

        /* Content Styles */
        .hero-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-align: center;
            margin-bottom: 20px;
        }

        .section-tag {
            font-family: var(--font-accent);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .expertise-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--primary);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Utility classes */
        .reveal-box {
            will-change: transform, opacity;
        }

    </style>
</head>
<body>

    <div id="loader">
        <svg class="loader-ring" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" />
        </svg>
        <div class="loader-percent">INITIALIZING: 00%</div>
    </div>

    <!-- Global Guided Dot -->
    <div class="guided-dot">
        <div class="dot-pulse"></div>
    </div>

    <div class="theater-stage">
        <canvas id="bg-canvas"></canvas>

        <!-- Scene 0: Hero -->
        <div class="scene" id="scene-hero">
            <h1 class="hero-title">ELITE<br>PERFORMANCE</h1>
            <p class="section-tag">Eric Lin / Fitness Coach</p>
        </div>

        <!-- Scene 1: Story -->
        <div class="scene" id="scene-story">
            <span class="section-tag">01 / Philosophy</span>
            <h2 class="hero-title" style="font-size: 3rem;">追求極致，從聰明的訓練開始</h2>
            <p style="color: var(--text-dim); text-align: center; max-width: 500px;">
                我們不只是在鍛鍊身體，是在重塑意志。透過科學化的數據分析與個人化導引，釋放你潛藏的運動潛能。
            </p>
        </div>

        <!-- Scene 2: Methods -->
        <div class="scene" id="scene-methods">
            <span class="section-tag">02 / Expertise</span>
            <div class="expertise-grid">
                <div class="expertise-item">
                    <h3>增肌減脂</h3>
                    <p>精準的體組成管理，打造理想體態。</p>
                </div>
                <div class="expertise-item">
                    <h3>體能改造</h3>
                    <p>提升心肺耐力與爆發力，突破體能極限。</p>
                </div>
                <div class="expertise-item">
                    <h3>運動表現</h3>
                    <p>專為專項運動員設計的強化訓練計畫。</p>
                </div>
            </div>
        </div>

        <!-- Scene 3: Action -->
        <div class="scene" id="scene-action">
            <span class="section-tag">03 / Action</span>
            <h2 class="hero-title" style="font-size: 3rem;">開始你的改變</h2>
            <div style="padding: 10px; background: #fff; border-radius: 10px; margin: 20px 0;">
                <img id="qr-target" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/ti/p/1VjR0jyXCu" alt="QR Code" style="width: 150px; height: 150px;">
            </div>
            <a href="https://line.me/ti/p/1VjR0jyXCu" style="background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; letter-spacing: 0.1em;">BOOK SESSION</a>
        </div>
    </div>

    <script>
        const dot = document.querySelector('.guided-dot');
        const scenes = document.querySelectorAll('.scene');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const loaderPercent = document.querySelector('.loader-percent');
        const loaderRing = document.querySelector('.loader-ring circle');
        
        let scrollProgress = 0;
        let currentPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let targetPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let qrCoords = { x: 0, y: 0 };
        let isLoading = true;

        // 1. Coordinate Caching
        function cacheQRCoords() {
            const qr = document.getElementById('qr-target');
            if (qr) {
                const rect = qr.getBoundingClientRect();
                qrCoords.x = rect.left + rect.width / 2;
                qrCoords.y = rect.top + rect.height / 2;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cacheQRCoords();
        });

        // 2. Loader & Boot Sequence
        function simulateLoading() {
            let progress = 0;
            function smoothLoader() {
                // Non-linear progress for organic feel
                progress += (100.5 - progress) * 0.04; 
                
                const offset = 314 - (314 * Math.min(100, progress) / 100);
                loaderRing.style.strokeDashoffset = offset;
                loaderPercent.textContent = `INITIALIZING: ${Math.floor(Math.min(100, progress)).toString().padStart(2, '0')}%`;
                
                // Show dot only after loader is ready and centered
                if (progress > 5) dot.style.opacity = '1';

                if (progress < 99.5) {
                    requestAnimationFrame(smoothLoader);
                } else {
                    bootSystem();
                }
            }
            requestAnimationFrame(smoothLoader);
        }

        function bootSystem() {
            anime({
                targets: '#loader',
                opacity: 0,
                duration: 800,
                easing: 'easeInOutQuad',
                complete: () => {
                    document.getElementById('loader').style.display = 'none';
                    isLoading = false;
                    updateDot();
                }
            });
            
            // Initial Pulse (Centering Fix: Preserve Translation)
            anime({
                targets: '.dot-pulse',
                translateX: ['-50%', '-50%'],
                translateY: ['-50%', '-50%'],
                scale: [1, 15],
                opacity: [1, 0],
                duration: 2500,
                easing: 'easeOutQuart'
            });
        }

        // 3. Scene & Morph Manager
        function updateScenes(progress) {
            let activeIndex = 0;
            if (progress < 0.25) activeIndex = 0;
            else if (progress < 0.5) activeIndex = 1;
            else if (progress < 0.75) activeIndex = 2;
            else activeIndex = 3;

            scenes.forEach((s, i) => {
                if (i === activeIndex) s.classList.add('active');
                else s.classList.remove('active');
            });

            // Morph logic for QR (Increased padding for full coverage)
            if (progress > 0.88) {
                dot.style.width = '220px'; 
                dot.style.height = '220px';
                dot.style.borderRadius = '20px';
                dot.style.background = 'rgba(240, 255, 66, 0.08)';
                dot.style.border = '2px solid rgba(240, 255, 66, 0.5)';
                dot.style.boxShadow = '0 0 40px rgba(240, 255, 66, 0.3)';
            } else {
                dot.style.width = '16px';
                dot.style.height = '16px';
                dot.style.borderRadius = '50%';
                dot.style.background = 'var(--primary)';
                dot.style.border = 'none';
                dot.style.boxShadow = '0 0 20px var(--primary), 0 0 40px var(--primary)';
            }
        }

        // 4. Motion Engine
        function updateDot() {
            if (isLoading) return;

            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight || 1;
            scrollProgress = Math.max(0, Math.min(1, scrollY / maxScroll));

            const time = scrollProgress * Math.PI * 2;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            if (scrollProgress > 0.88) {
                // QR Snap Phase
                targetPos.x = qrCoords.x;
                targetPos.y = qrCoords.y;
            } else {
                // Free Flow Phase
                targetPos.x = centerX + Math.sin(time * 2.5) * (window.innerWidth * 0.35);
                targetPos.y = centerY + Math.cos(time * 1.2) * (window.innerHeight * 0.25);
            }

            // Smoother lerp for snap
            const lerpFactor = scrollProgress > 0.88 ? 0.15 : 0.08;
            currentPos.x += (targetPos.x - currentPos.x) * lerpFactor;
            currentPos.y += (targetPos.y - currentPos.y) * lerpFactor;

            dot.style.left = `${currentPos.x}px`;
            dot.style.top = `${currentPos.y}px`;

            // Scaling (disabled in snap phase)
            if (scrollProgress <= 0.88) {
                const dx = targetPos.x - currentPos.x;
                const dy = targetPos.y - currentPos.y;
                const speed = Math.sqrt(dx*dx + dy*dy);
                const scale = 1 + Math.min(1.5, speed / 40);
                dot.style.transform = `translate(-50%, -50%) scale(${scale})`;
            } else {
                dot.style.transform = `translate(-50%, -50%) scale(1)`;
            }

            updateScenes(scrollProgress);
            drawBackground();
            requestAnimationFrame(updateDot);
        }

        // 5. Background & Init
        function drawBackground() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(240, 255, 66, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(currentPos.x, currentPos.y);
            ctx.stroke();
        }

        window.addEventListener('load', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cacheQRCoords();
            simulateLoading();
            
            // Keep dot in center during loading
            dot.style.left = '50%';
            dot.style.top = '50%';
        });
    </script>
</body>
</html>
