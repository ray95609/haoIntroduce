<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIC LIN | ELITE PERFORMANCE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --primary: #f0ff42;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Space Grotesk', sans-serif;
            --transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            width: 100%;
            height: 600vh; /* Scroll length */
            -webkit-font-smoothing: antialiased;
        }

        /* Theater Stage */
        .theater-stage {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 5;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Guided Dot (Theatre Version) */
        .guided-dot {
            position: absolute; /* Relative to theater-stage */
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            transform: translate(-50%, -50%);
            will-change: left, top, transform;
        }

        .dot-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        /* Content Styles */
        .hero-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-align: center;
            margin-bottom: 20px;
        }

        .section-tag {
            font-family: var(--font-accent);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .expertise-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--primary);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Utility classes */
        .reveal-box {
            will-change: transform, opacity;
        }

    </style>
</head>
<body>

    <div id="loader">
        <text class="loader-text">ERIC LIN</text>
    </div>

    <div class="theater-stage">
        <canvas id="bg-canvas"></canvas>
        
        <div class="guided-dot">
            <div class="dot-pulse"></div>
        </div>

        <!-- Scene 0: Hero -->
        <div class="scene" id="scene-hero">
            <h1 class="hero-title">ELITE<br>PERFORMANCE</h1>
            <p class="section-tag">Eric Lin / Fitness Coach</p>
        </div>

        <!-- Scene 1: Story -->
        <div class="scene" id="scene-story">
            <span class="section-tag">01 / Philosophy</span>
            <h2 class="hero-title" style="font-size: 3rem;">追求極致，從聰明的訓練開始</h2>
            <p style="color: var(--text-dim); text-align: center; max-width: 500px;">
                我們不只是在鍛鍊身體，是在重塑意志。透過科學化的數據分析與個人化導引，釋放你潛藏的運動潛能。
            </p>
        </div>

        <!-- Scene 2: Methods -->
        <div class="scene" id="scene-methods">
            <span class="section-tag">02 / Expertise</span>
            <div class="expertise-grid">
                <div class="expertise-item">
                    <h3>增肌減脂</h3>
                    <p>精準的體組成管理，打造理想體態。</p>
                </div>
                <div class="expertise-item">
                    <h3>體能改造</h3>
                    <p>提升心肺耐力與爆發力，突破體能極限。</p>
                </div>
                <div class="expertise-item">
                    <h3>運動表現</h3>
                    <p>專為專項運動員設計的強化訓練計畫。</p>
                </div>
            </div>
        </div>

        <!-- Scene 3: Action -->
        <div class="scene" id="scene-action">
            <span class="section-tag">03 / Action</span>
            <h2 class="hero-title" style="font-size: 3rem;">開始你的改變</h2>
            <div style="padding: 10px; background: #fff; border-radius: 10px; margin: 20px 0;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/ti/p/1VjR0jyXCu" alt="QR Code" style="width: 150px; height: 150px;">
            </div>
            <a href="https://line.me/ti/p/1VjR0jyXCu" style="background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; letter-spacing: 0.1em;">BOOK SESSION</a>
        </div>
    </div>

    <script>
        // Config
        const dot = document.querySelector('.guided-dot');
        const scenes = document.querySelectorAll('.scene');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let scrollProgress = 0;
        let currentPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let targetPos = { x: window.innerWidth/2, y: window.innerHeight/2 };

        // 1. Scene Manager (Cross-fade between absolute scenes)
        function updateScenes(progress) {
            // Determine active scene based on scroll percentage
            let activeIndex = 0;
            if (progress < 0.25) activeIndex = 0;
            else if (progress < 0.5) activeIndex = 1;
            else if (progress < 0.75) activeIndex = 2;
            else activeIndex = 3;

            scenes.forEach((s, i) => {
                if (i === activeIndex) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
        }

        // 2. Math-Based Anchor Engine (Lissajous Curve)
        function updateDot() {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight || 1;
            scrollProgress = Math.max(0, Math.min(1, scrollY / maxScroll));

            // Parametric Motion (Floating Infinity Loop)
            const time = scrollProgress * Math.PI * 2;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // X/Y oscillate with different frequencies for complex curves
            targetPos.x = centerX + Math.sin(time * 2.5) * (window.innerWidth * 0.35);
            targetPos.y = centerY + Math.cos(time * 1.2) * (window.innerHeight * 0.25);

            // Lerp for high-end smoothness
            currentPos.x += (targetPos.x - currentPos.x) * 0.08;
            currentPos.y += (targetPos.y - currentPos.y) * 0.08;

            dot.style.left = `${currentPos.x}px`;
            dot.style.top = `${currentPos.y}px`;

            // Velocity-based scaling
            const dx = targetPos.x - currentPos.x;
            const dy = targetPos.y - currentPos.y;
            const speed = Math.sqrt(dx*dx + dy*dy);
            const scale = 1 + Math.min(1.5, speed / 40);
            dot.style.transform = `translate(-50%, -50%) scale(${scale})`;

            updateScenes(scrollProgress);
            drawBackground();
            requestAnimationFrame(updateDot);
        }

        // 3. Ambient Background Animation
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function drawBackground() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Energy center connection
            ctx.strokeStyle = 'rgba(240, 255, 66, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(currentPos.x, currentPos.y);
            ctx.stroke();
        }

        // 4. Initialization & Intro
        window.addEventListener('load', () => {
            // Simple Intro Fade
            anime({
                targets: '#loader',
                opacity: 0,
                duration: 1000,
                delay: 1000,
                easing: 'easeInOutQuad',
                complete: () => {
                    document.getElementById('loader').style.display = 'none';
                    updateDot();
                }
            });
        });
    </script>
</body>
</html>
