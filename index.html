<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIC LIN | ELITE PERFORMANCE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --primary: #FFB11B;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Space Grotesk', sans-serif;
            --transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            width: 100%;
            height: 600vh; /* Scroll length */
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen (Energy Boot) */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loader-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transform: rotate(-90deg);
            transform-origin: center;
        }

        .loader-percent {
            position: absolute;
            bottom: 35%; /* Fixed position relative to center */
            font-family: var(--font-accent);
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }

        /* Theater Stage */
        .theater-stage {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 5;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Guided Dot (Theatre Version) */
        .guided-dot {
            position: fixed;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 10001;
            pointer-events: none;
            box-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            transform: translate(-50%, -50%);
            opacity: 0; 
            will-change: left, top, transform, width, height, border-radius;
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        height 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        border-radius 0.6s ease,
                        opacity 0.4s ease;
            mix-blend-mode: screen; /* Optical blend with text */
        }

        .dot-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(8px);
            z-index: -1;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* Content Styles */
        .hero-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-align: center;
            margin-bottom: 20px;
        }

        .section-tag {
            font-family: var(--font-accent);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .narrative-text {
            font-size: 2.2rem;
            line-height: 1.4;
            text-align: center;
            letter-spacing: 0.1em;
            color: var(--text); /* Restored to pure white */
            transition: color 0.5s ease;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .expertise-item {
            position: relative;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 177, 27, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .expertise-item.active {
            background: rgba(255, 177, 27, 0.05);
            border-color: rgba(255, 177, 27, 0.3);
            transform: scale(1.02);
        }

        .expertise-item::after {
            content: '';
            position: absolute;
            top: -100%; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255, 177, 27, 0.15), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        .expertise-item::before {
            content: '';
            position: absolute;
            top: 10px; right: 10px;
            width: 8px; height: 8px;
            border-top: 1px solid var(--primary);
            border-right: 1px solid var(--primary);
            opacity: 0.4;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Utility classes */
        .reveal-box {
            will-change: transform, opacity;
        }

    </style>
</head>
<body>

    <div id="loader">
        <svg class="loader-ring" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" />
        </svg>
        <div class="loader-percent">INITIALIZING: 00%</div>
    </div>

    <!-- Global Guided Dot -->
    <div class="guided-dot" id="main-dot">
        <div class="dot-pulse"></div>
    </div>

    <div class="theater-stage">
        <canvas id="bg-canvas"></canvas>

        <!-- Scene 0: Hero -->
        <div class="scene" id="scene-hero">
            <span class="section-tag" id="tag-hero">Eric Lin | Elite Performance</span>
            <h1 class="hero-title" id="title-hero">PEAK<br>CONDITION</h1>
        </div>

        <div class="scene" id="scene-intro">
            <span class="section-tag" id="tag-intro">01 / Narrative</span>
            <h2 class="narrative-text" id="text-intro">專業、精確、卓越<br>成就非凡自我</h2>
        </div>

        <div class="scene" id="scene-expertise">
            <span class="section-tag" id="tag-expertise">02 / Expertise</span>
            <div class="expertise-grid">
                <div class="expertise-item" id="exp-1">
                    <h3>體能評估</h3>
                    <p>精確數據分析，定義起點</p>
                </div>
                <div class="expertise-item" id="exp-2">
                    <h3>個人化計劃</h3>
                    <p>量身打造，科學化訓練路徑</p>
                </div>
                <div class="expertise-item" id="exp-3">
                    <h3>動作優化</h3>
                    <p>極致細節，釋放潛在效能</p>
                </div>
            </div>
        </div>

        <!-- Scene 3: Action -->
        <div class="scene" id="scene-action">
            <span class="section-tag">03 / Action</span>
            <h2 class="hero-title" style="font-size: 3rem;">開始你的改變</h2>
            <div style="padding: 10px; background: #fff; border-radius: 10px; margin: 20px 0 40px 0;">
                <img id="qr-target" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/ti/p/1VjR0jyXCu" alt="QR Code" style="width: 150px; height: 150px;">
            </div>
            <a href="https://line.me/ti/p/1VjR0jyXCu" style="background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; letter-spacing: 0.1em; display: inline-block;">BOOK SESSION</a>
        </div>
    </div>

    <script>
        // 1. Core State
        let scrollProgress = 0;
        let qrCoords = { x: 0, y: 0 };
        let anchorCoords = { intro: { x: 0, y: 0 }, exp: [] };
        let currentPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let targetPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let isLoading = true;

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const dot = document.getElementById('main-dot');
        const dotPulse = document.querySelector('.dot-pulse');
        const loaderRing = document.querySelector('.loader-ring');
        const loaderPercent = document.querySelector('.loader-percent');
        const scenes = document.querySelectorAll('.scene');

        function cacheAnchors() {
            // QR
            const qr = document.getElementById('qr-target');
            if (qr) {
                const rect = qr.getBoundingClientRect();
                qrCoords = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            }

            // Narrative Anchors
            const intro = document.getElementById('text-intro');
            if (intro) {
                const rect = intro.getBoundingClientRect();
                anchorCoords.intro = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            }

            anchorCoords.exp = [1, 2, 3].map(i => {
                const el = document.getElementById(`exp-${i}`);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                }
                return null;
            }).filter(p => p !== null);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cacheAnchors();
        });

        // 2. Loader & Boot Sequence
        function simulateLoading() {
            let progress = 0;
            function smoothLoader() {
                progress += (100.5 - progress) * 0.04; 
                
                const offset = 314 - (314 * Math.min(100, progress) / 100);
                loaderRing.querySelector('circle').style.strokeDashoffset = offset;
                loaderPercent.textContent = `INITIALIZING: ${Math.floor(Math.min(100, progress)).toString().padStart(2, '0')}%`;
                
                if (progress > 5) dot.style.opacity = '1';

                if (progress < 99.5) {
                    requestAnimationFrame(smoothLoader);
                } else {
                    bootSystem();
                }
            }
            requestAnimationFrame(smoothLoader);
        }

        function bootSystem() {
            anime({
                targets: '#loader',
                opacity: 0,
                duration: 800,
                easing: 'easeInOutQuad',
                complete: () => {
                    document.getElementById('loader').style.display = 'none';
                    isLoading = false;
                    updateDot();
                }
            });
            
            anime({
                targets: '.dot-pulse',
                translateX: ['-50%', '-50%'],
                translateY: ['-50%', '-50%'],
                scale: [1, 15],
                opacity: [1, 0],
                duration: 2500,
                easing: 'easeOutQuart'
            });
        }

        // 3. Scene & Morph Manager
        function updateScenes(progress) {
            let activeIndex = 0;
            if (progress < 0.25) activeIndex = 0;
            else if (progress < 0.5) activeIndex = 1;
            else if (progress < 0.75) activeIndex = 2;
            else activeIndex = 3;

            scenes.forEach((s, i) => {
                if (i === activeIndex) s.classList.add('active');
                else s.classList.remove('active');
            });

            // Expertise Item Highlighting
            const items = document.querySelectorAll('.expertise-item');
            if (activeIndex === 2) {
                const subProgress = (progress - 0.45) / 0.35;
                const activeItemIdx = Math.min(items.length - 1, Math.floor(subProgress * items.length));
                items.forEach((item, i) => {
                    if (i === activeItemIdx) item.classList.add('active');
                    else item.classList.remove('active');
                });
            } else {
                items.forEach(item => item.classList.remove('active'));
            }

            // Morph logic for QR
            if (progress > 0.88) {
                dot.style.width = '220px'; 
                dot.style.height = '220px';
                dot.style.borderRadius = '20px';
                dot.style.background = 'rgba(255, 177, 27, 0.08)';
                dot.style.border = '2px solid rgba(255, 177, 27, 0.5)';
                dot.style.boxShadow = '0 0 40px rgba(255, 177, 27, 0.3)';
            } else {
                dot.style.width = '16px';
                dot.style.height = '16px';
                dot.style.borderRadius = '50%';
                dot.style.background = 'var(--primary)';
                dot.style.border = 'none';
                dot.style.boxShadow = '0 0 20px var(--primary), 0 0 40px var(--primary)';
            }
        }

        // 4. Motion Engine
        function updateDot() {
            if (isLoading) return;

            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight || 1;
            scrollProgress = Math.max(0, Math.min(1, scrollY / maxScroll));

            const time = scrollProgress * Math.PI * 2;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Base Ambient Motion
            let mathX = centerX + Math.sin(time * 2.5) * (window.innerWidth * 0.35);
            let mathY = centerY + Math.cos(time * 1.2) * (window.innerHeight * 0.25);

            if (scrollProgress > 0.88) {
                // QR Snap Phase
                targetPos.x = qrCoords.x;
                targetPos.y = qrCoords.y;
            } else {
                // Narrative Gravity Blending
                let gravityX = mathX;
                let gravityY = mathY;
                let influence = 0;

                if (scrollProgress > 0.2 && scrollProgress < 0.45) {
                    // Intro Focus (Direct Overlap)
                    gravityX = anchorCoords.intro.x;
                    gravityY = anchorCoords.intro.y;
                    influence = Math.sin((scrollProgress - 0.2) / 0.25 * Math.PI) * 0.95;
                } else if (scrollProgress >= 0.45 && scrollProgress < 0.8) {
                    // Expertise Focus (sequential items)
                    const subProgress = (scrollProgress - 0.45) / 0.35;
                    const itemIdx = Math.min(anchorCoords.exp.length - 1, Math.floor(subProgress * anchorCoords.exp.length));
                    const target = anchorCoords.exp[itemIdx];
                    if (target) {
                        gravityX = target.x;
                        gravityY = target.y;
                        influence = 0.6; // Constant gentle pull
                    }
                }

                targetPos.x = mathX * (1 - influence) + gravityX * influence;
                targetPos.y = mathY * (1 - influence) + gravityY * influence;
            }

            const lerpFactor = scrollProgress > 0.88 ? 0.15 : 0.08;
            currentPos.x += (targetPos.x - currentPos.x) * lerpFactor;
            currentPos.y += (targetPos.y - currentPos.y) * lerpFactor;

            dot.style.left = `${currentPos.x}px`;
            dot.style.top = `${currentPos.y}px`;

            // Organic Heartbeat (Only active before QR snap, paused during text focus)
            const isIntroFocus = scrollProgress > 0.2 && scrollProgress < 0.45;
            if (scrollProgress <= 0.88 && !isIntroFocus) {
                const hTime = Date.now() * 0.003;
                const pulse = Math.pow(Math.sin(hTime), 12) + 0.4 * Math.pow(Math.sin(hTime - 0.5), 8);
                dotPulse.style.transform = `translate(-50%, -50%) scale(${1 + pulse * 2})`;
                dotPulse.style.opacity = 0.1 + pulse * 0.6;
            } else {
                dotPulse.style.opacity = '0';
            }

            // Dot Scaling (Ambient & Intro Focus)
            if (scrollProgress <= 0.88) {
                const dx = targetPos.x - currentPos.x;
                const dy = targetPos.y - currentPos.y;
                const speed = Math.sqrt(dx*dx + dy*dy);
                
                // Enlarge dot during intro for better scanning coverage
                let baseScale = 1;
                if (scrollProgress > 0.2 && scrollProgress < 0.45) {
                    baseScale = 4; // Larger glow for text coverage
                }
                
                const scale = baseScale + Math.min(1.2, speed / 50);
                dot.style.transform = `translate(-50%, -50%) scale(${scale})`;
                dot.style.filter = baseScale > 1 ? 'blur(15px)' : 'none';
            } else {
                dot.style.transform = `translate(-50%, -50%) scale(1)`;
            }

            updateScenes(scrollProgress);
            drawBackground();
            requestAnimationFrame(updateDot);
        }

        // 5. Background & Init
        function drawBackground() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Scene 2 Grid Background
            if (scrollProgress > 0.45 && scrollProgress < 0.8) {
                const gridAlpha = Math.min(0.04, (scrollProgress - 0.45) * 0.2);
                ctx.strokeStyle = `rgba(255, 177, 27, ${gridAlpha})`;
                const size = 60;
                ctx.beginPath();
                for (let x = 0; x <= canvas.width; x += size) {
                    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                }
                for (let y = 0; y <= canvas.height; y += size) {
                    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
                }
                ctx.stroke();
            }

            // Connection Line (RESTORED)
            ctx.strokeStyle = 'rgba(255, 177, 27, 0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(currentPos.x, currentPos.y);
            ctx.stroke();
        }

        window.addEventListener('load', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cacheAnchors();
            simulateLoading();
            
            dot.style.left = '50%';
            dot.style.top = '50%';
            dot.style.opacity = '0';
        });
    </script>
</body>
</html>
