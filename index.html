<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIC LIN | ELITE PERFORMANCE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --primary: #f0ff42;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Space Grotesk', sans-serif;
            --transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* 鎖定主容器，防止左右晃動 */
        #app-wrapper {
            position: relative;
            width: 100%;
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loader-svg {
            width: 300px;
            overflow: visible;
        }

        .loader-text {
            fill: none;
            stroke: var(--primary);
            stroke-width: 1;
            font-family: var(--font-main);
            font-weight: 900;
            font-size: 40px;
            letter-spacing: 5px;
        }

        /* Cinematic Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden; /* Wait for intro */
        }

        .hero-img-container {
            position: absolute;
            width: 100%; height: 100%;
            clip-path: circle(0% at 50% 50%); /* For anime.js */
            z-index: 1;
        }

        .hero-img-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: brightness(0.7) contrast(1.1);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            mix-blend-mode: difference;
        }

        .hero-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            overflow: hidden;
        }

        .hero-title span {
            display: inline-block;
            transform: translateY(100%);
        }

        .hero-sub {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-family: var(--font-accent);
            letter-spacing: 0.2em;
            margin-top: 20px;
            opacity: 0;
        }

        /* Story Sections */
        .story-section {
            position: relative;
            min-height: 100vh;
            padding: 100px 5vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
        }

        .section-tag {
            font-family: var(--font-accent);
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        .section-title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            max-width: 900px;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .section-desc {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            line-height: 1.6;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .expertise-item {
            padding: 40px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            transition: var(--transition);
        }

        .expertise-item:hover {
            background: rgba(240, 255, 66, 0.05);
            border-left-color: var(--primary);
        }

        .expertise-item h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .expertise-item p {
            color: var(--text-dim);
            line-height: 1.6;
        }

        .book-btn {
            display: inline-block;
            padding: 20px 50px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-top: 40px;
            transition: var(--transition);
        }

        .book-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(240, 255, 66, 0.3);
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        /* QR Code Styling */
        .qr-container {
            margin-top: 50px;
            text-align: center;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            display: inline-block;
            transition: var(--transition);
        }

        .qr-code img {
            width: 100%;
            height: 100%;
        }

        /* Mobile specific scroll tweaks */
        @media (max-width: 768px) {
            .story-section {
                padding: 60px 8vw;
            }
            .section-title {
                font-size: 2.5rem;
            }
            .expertise-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Guided Dot */
        .guided-dot {
            position: fixed;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            box-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            transform: translate(-50%, -50%);
            will-change: left, top, transform, width, height;
        }

        .dot-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        /* Hidden Path Container */
        #path-container {
            position: absolute;
            width: 1px; height: 1px;
            overflow: hidden;
            opacity: 0;
        }

        /* Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: #000;
        }

        /* Utility classes */
        .reveal-box {
            will-change: transform, opacity;
        }

    </style>
</head>
<body>

    <div id="loader">
        <svg class="loader-svg" viewBox="0 0 400 200">
            <!-- Geometric Frame -->
            <path class="loader-frame" d="M 50,50 L 350,50 L 350,150 L 50,150 Z" fill="none" stroke="var(--primary)" stroke-width="0.5" />
            <text x="50%" y="105" text-anchor="middle" dominant-baseline="middle" class="loader-text">ERIC LIN</text>
        </svg>
    </div>

    <canvas id="bg-canvas"></canvas>

    <!-- Guided Dot Narrative -->
    <div class="guided-dot">
        <div class="dot-pulse"></div>
    </div>
    
    <div id="path-container">
        <svg viewBox="0 0 100 1000">
            <!-- Path zig-zags to follow the storytelling flow -->
            <path id="guide-path" d="M 50,20 C 80,150 20,250 50,400 S 80,600 50,750 S 20,900 50,980" fill="none" />
        </svg>
    </div>

    <div id="app-wrapper">
        <section class="hero" id="hero">
            <div class="hero-img-container">
                <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80" alt="Eric Lin Coach">
            </div>
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="t1">Elite</span><br>
                    <span class="t2">Performance</span>
                </h1>
                <p class="hero-sub">REDEFINING YOUR POTENTIAL — BY ERIC LIN</p>
            </div>
        </section>

        <!-- Story Sections -->
        <section class="story-section" id="philosophy">
            <div class="reveal-box">
                <span class="section-tag">01 / Philosophy</span>
                <h2 class="section-title">
                    你需要的不是更努力，<br>而是更聰明的訓練。
                </h2>
                <p class="section-desc">科學訓練，成就卓越。我們不只是教動作，我們是在優化你的生活與運動表現。</p>
            </div>
        </section>

        <section class="story-section" id="expertise">
            <div class="reveal-box">
                <span class="section-tag">02 / Expertise</span>
                <h2 class="section-title">專業項目</h2>
                <div class="expertise-grid">
                    <div class="expertise-item">
                        <h3>長者肌力</h3>
                        <p>優化生活品質，重拾行動自由。</p>
                    </div>
                    <div class="expertise-item">
                        <h3>專項運動表現</h3>
                        <p>突破極限，追求卓越表現。</p>
                    </div>
                    <div class="expertise-item">
                        <h3>傷後功能重建</h3>
                        <p>科學康復，安全回歸運動。</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="story-section" id="contact">
            <div class="reveal-box">
                <span class="section-tag">03 / Action</span>
                <h2 class="section-title">開始你的改變</h2>
                <div class="qr-container">
                    <div class="qr-code">
                        <!-- Eric's LINE QR Code -->
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/ti/p/1VjR0jyXCu" alt="LINE QR Code">
                    </div>
                </div>
                <a href="https://line.me/ti/p/1VjR0jyXCu" class="book-btn">BOOK SESSION</a>
            </div>
        </section>
    </div>

    <script>
        // --- 1. Canvas Dot Grid ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        const spacing = 40;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for (let x = 0; x <= canvas.width; x += spacing) {
                for (let y = 0; y <= canvas.height + 200; y += spacing) {
                    dots.push({ x, y, originY: y });
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(240, 255, 66, 0.1)';
            
            const scrollOffset = window.scrollY * 0.15;
            
            dots.forEach(dot => {
                let displayY = (dot.originY - scrollOffset) % (canvas.height + 200);
                if (displayY < 0) displayY += (canvas.height + 200);
                
                if (displayY <= canvas.height) {
                    ctx.beginPath();
                    ctx.arc(dot.x, displayY, 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        render();

        // --- 2. Guided Dot Engine (Mobile First) ---
        const dot = document.querySelector('.guided-dot');
        const pulse = document.querySelector('.dot-pulse');
        const path = anime.path('#guide-path');
        
        let scrollProgress = 0;
        let currentPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let targetPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        function updateDot() {
            const scrollY = window.scrollY;
            const maxScroll = (document.documentElement.scrollHeight - window.innerHeight) || 1;
            scrollProgress = Math.max(0, Math.min(1, scrollY / maxScroll));

            // Map progress to path (0 to 100)
            const pathProgress = scrollProgress * 100;
            const p = path(pathProgress);

            // Fixed Viewport Mapping (Mobile Optimized)
            // We use a safe-zone for x (15% to 85%)
            const safeWidth = window.innerWidth * 0.7;
            targetPos.x = (window.innerWidth * 0.15) + (p.x / 100) * safeWidth;
            
            // Y is mapped to viewport height (20% to 80% to keep in view)
            const safeHeight = window.innerHeight * 0.6;
            targetPos.y = (window.innerHeight * 0.2) + (p.y / 1000) * safeHeight;

            // Smooth Lerp
            currentPos.x += (targetPos.x - currentPos.x) * 0.12;
            currentPos.y += (targetPos.y - currentPos.y) * 0.12;

            dot.style.left = `${currentPos.x}px`;
            dot.style.top = `${currentPos.y}px`;

            // Velocity-based scaling (Stretch on move)
            const dx = targetPos.x - currentPos.x;
            const dy = targetPos.y - currentPos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const scale = 1 + Math.min(0.5, dist / 100);
            
            if (scrollProgress < 0.95) {
                dot.style.transform = `translate(-50%, -50%) scale(${scale})`;
                dot.style.width = '14px';
                dot.style.height = '14px';
                dot.style.opacity = '1';
            } else {
                // Final nesting pulse
                dot.style.transform = `translate(-50%, -50%) scale(1)`;
                dot.style.width = '80px';
                dot.style.height = '80px';
                dot.style.opacity = '0.15';
            }

            requestAnimationFrame(updateDot);
        }
        updateDot();

        // --- 3. Master Animation Timeline ---
        window.addEventListener('load', () => {
            const tl = anime.timeline({
                easing: 'easeOutExpo'
            });

            tl
            .add({
                targets: '.loader-frame',
                strokeDashoffset: [anime.setDashoffset, 0],
                duration: 1500,
                delay: 500,
                easing: 'easeInOutSine'
            })
            .add({
                targets: '.loader-text',
                opacity: [0, 1],
                letterSpacing: ['0.5em', '1.2em'],
                duration: 1000
            }, '-=800')
            .add({
                targets: '#loader',
                opacity: 0,
                duration: 800,
                easing: 'easeInOutQuart',
                complete: () => {
                    document.getElementById('loader').style.display = 'none';
                }
            })
            .add({
                targets: '.hero-img-container',
                clipPath: ['circle(0% at 50% 50%)', 'circle(100% at 50% 50%)'],
                duration: 2000,
                easing: 'easeInOutQuart'
            }, '-=600')
            .add({
                targets: '.hero-title span',
                translateY: [100, 0],
                opacity: [0, 1],
                rotate: [5, 0],
                delay: anime.stagger(150),
                duration: 1200
            }, '-=1500')
            .add({
                targets: '.hero-sub',
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 800
            }, '-=800');

            // --- 4. Intersection Observer for Storytelling ---
            const observerOptions = { threshold: 0.15 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = entry.target;
                        
                        // Trigger Pulse on Dot when entering section
                        anime({
                            targets: '.dot-pulse',
                            scale: [1, 4],
                            opacity: [0.8, 0],
                            duration: 1000,
                            easing: 'easeOutQuart'
                        });

                        const revealElements = target.querySelectorAll('.reveal-box > *, .expertise-item');
                        
                        anime({
                            targets: revealElements,
                            opacity: [0, 1],
                            translateY: [30, 0],
                            delay: anime.stagger(150),
                            duration: 1200,
                            easing: 'easeOutExpo'
                        });

                        observer.unobserve(target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.story-section').forEach(section => {
                const children = section.querySelectorAll('.reveal-box > *, .expertise-item');
                children.forEach(c => c.style.opacity = '0');
                observer.observe(section);
            });
        });
    </script>
</body>
</html>
